<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Support page for PaperDPI by K's App.">
  <title>Support | PaperDPI</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f7f9f8;
      --surface: #ffffff;
      --text: #18211f;
      --muted: #5a6864;
      --line: #dbe4e0;
      --accent: #0d6b42;
    }

    * { box-sizing: border-box; }
    html { background: var(--background); }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      line-height: 1.7;
      background: linear-gradient(180deg, #eef5f1 0%, var(--background) 260px);
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: clamp(24px, 5vw, 44px);
      box-shadow: 0 18px 46px rgba(18, 32, 28, 0.08);
    }

    h1 {
      font-size: clamp(32px, 7vw, 44px);
      line-height: 1.15;
      margin: 0 0 16px;
    }

    h2 {
      font-size: 24px;
      line-height: 1.25;
      margin: 36px 0 12px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    p { margin: 12px 0; }

    a {
      color: var(--accent);
      font-weight: 700;
      text-underline-offset: 0.16em;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>Support</h1>
      <p>For questions, bug reports, feature requests, or feedback about PaperDPI, please contact us by email.</p>
      <p>Email: <a href="mailto:keyroid.ai@gmail.com">keyroid.ai@gmail.com</a></p>

      <h2>サポート</h2>
      <p>PaperDPI に関する不具合報告・ご質問・ご要望は、以下のメールアドレスまでご連絡ください。</p>
      <p>Email: <a href="mailto:keyroid.ai@gmail.com">keyroid.ai@gmail.com</a></p>

      <p class="meta">K's App</p>
    </article>
  </main>
</body>
</html>
