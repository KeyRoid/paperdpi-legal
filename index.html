<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Legal and support pages for PaperDPI by K's App.">
  <title>Legal Pages | PaperDPI</title>
  <style>:root {
  color-scheme: light;
  --bg: #f6f8f7;
  --paper: #ffffff;
  --text: #18211f;
  --muted: #5a6864;
  --line: #dbe4e0;
  --accent: #159957;
  --accent-dark: #0d6b42;
}
* { box-sizing: border-box; }
html { background: var(--bg); }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  line-height: 1.7;
  background: linear-gradient(180deg, #eef5f1 0%, var(--bg) 280px);
}
.page {
  width: min(920px, calc(100% - 32px));
  margin: 0 auto;
  padding: 40px 0 64px;
}
.header {
  margin-bottom: 24px;
}
.brand {
  font-size: 14px;
  letter-spacing: 0.04em;
  color: var(--accent-dark);
  font-weight: 700;
  text-transform: uppercase;
}
.card {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: clamp(22px, 4vw, 42px);
  box-shadow: 0 18px 46px rgba(18, 32, 28, 0.08);
}
h1 { font-size: clamp(30px, 6vw, 44px); line-height: 1.15; margin: 8px 0 12px; }
h2 { font-size: 22px; line-height: 1.3; margin: 36px 0 12px; padding-top: 4px; }
h3 { font-size: 18px; line-height: 1.35; margin: 28px 0 10px; }
p { margin: 12px 0; }
ul { padding-left: 1.4rem; }
li { margin: 6px 0; }
hr { border: 0; border-top: 1px solid var(--line); margin: 32px 0; }
a { color: var(--accent-dark); font-weight: 650; text-decoration-thickness: 0.08em; text-underline-offset: 0.16em; }
pre {
  overflow-x: auto;
  white-space: pre-wrap;
  background: #eef4f1;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
}
.footer {
  color: var(--muted);
  font-size: 13px;
  margin-top: 22px;
}
.nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.nav a {
  display: block;
  padding: 16px 18px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  text-decoration: none;
}
.small { color: var(--muted); font-size: 14px; }
@media (max-width: 520px) {
  .page { width: min(100% - 20px, 920px); padding-top: 24px; }
  .card { border-radius: 14px; }
}</style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="brand">PaperDPI / K's App</div>
    </header>
    <article class="card">

<h1>PaperDPI Legal Pages</h1>
<p class="small">K's App</p>
<p>Legal and support pages for PaperDPI.</p>
<div class="nav">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Use</a>
  <a href="support.html">Support</a>
  <a href="tokushoho.html">Specified Commercial Transaction Act Disclosure</a>
</div>

    </article>
    <footer class="footer">© 2026 K's App</footer>
  </main>
</body>
</html>
